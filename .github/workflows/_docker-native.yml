name: Docker Native

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      image:
        required: true
        type: string

jobs:
  docker_native:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Generate build metadata
        id: build_meta
        run: echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build native Docker image (linux/amd64, local)
        id: docker_native_build
        continue-on-error: true
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./Dockerfile-native
          push: false
          load: true
          platforms: linux/amd64
          tags: ${{ inputs.image }}:native-${{ inputs.version }}
          build-args: |
            BUILD_DATE=${{ steps.build_meta.outputs.date }}
            BUILD_VERSION=${{ inputs.version }}
            BUILD_REVISION=${{ github.sha }}

      - name: Make container check script executable
        run: chmod +x scripts/check-container-endpoints.sh

      - name: Validate native container endpoints
        shell: bash
        continue-on-error: true
        run: |
          set -euo pipefail
          image="${{ inputs.image }}:native-${{ inputs.version }}"
          ./scripts/check-container-endpoints.sh "$image" 18081 native-container-endpoint-check.md "Native Container Endpoint Check"

      - name: Upload native container endpoint check report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: native-container-endpoint-check-${{ github.run_id }}
          path: native-container-endpoint-check.md

      - name: Add native endpoint check to PR
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('native-container-endpoint-check.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push native Docker tags to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        continue-on-error: true
        run: |
          set -euo pipefail
          image="${{ inputs.image }}"
          version="${{ inputs.version }}"
          short_sha="${GITHUB_SHA::7}"

          docker tag "$image:native-$version" "$image:native-latest"
          docker tag "$image:native-$version" "$image:native-main"
          docker tag "$image:native-$version" "$image:native-sha-$short_sha"

          docker push "$image:native-$version"
          docker push "$image:native-latest"
          docker push "$image:native-main"
          docker push "$image:native-sha-$short_sha"
