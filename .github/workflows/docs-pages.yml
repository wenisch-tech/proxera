name: Publish Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Build docs
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Upload site as artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-docs
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Checkout website repository
        uses: actions/checkout@v6
        with:
          repository: wenisch-tech/proxera-website
          token: ${{ secrets.GITHUBTOKEN }}
          path: proxera-website

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: site-docs
          path: ./site

      - name: Copy documentation to website repository
        run: |
          cp -r ./site/* ./proxera-website/docs/

      - name: Commit and push to website repository
        run: |
          cd proxera-website
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: update documentation from proxera repo" && git push)
