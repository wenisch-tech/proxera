name: Docker

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      image:
        required: true
        type: string
    outputs:
      digest:
        description: Pushed image digest
        value: ${{ jobs.docker.outputs.digest }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write
      issues: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.sign.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Java 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Set Maven version
        run: mvn -B versions:set -DnewVersion=${{ inputs.version }} -DgenerateBackupPoms=false

      - name: Build application JAR
        run: mvn -B -DskipTests package

      - name: Generate build metadata
        id: build_meta
        run: echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build Docker image (local)
        id: docker_build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ${{ inputs.image }}:${{ inputs.version }}
          build-args: |
            BUILD_DATE=${{ steps.build_meta.outputs.date }}
            BUILD_VERSION=${{ inputs.version }}
            BUILD_REVISION=${{ github.sha }}

      - name: Make container check script executable
        run: chmod +x scripts/check-container-endpoints.sh

      - name: Validate container endpoints
        shell: bash
        run: |
          set -euo pipefail
          image="${{ inputs.image }}:${{ inputs.version }}"
          ./scripts/check-container-endpoints.sh "$image" 18080 container-endpoint-check.md "Container Endpoint Check"

      - name: Upload container endpoint check report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: container-endpoint-check-${{ github.run_id }}
          path: container-endpoint-check.md

      - name: Add container endpoint check to PR
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('container-endpoint-check.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.2.6

      - name: Run Trivy scan
        shell: bash
        run: |
          set -e
          image="${{ inputs.image }}:${{ inputs.version }}"
          status=1

          for attempt in 1 2 3; do
            trivy image \
              --format table \
              --output trivy-report.txt \
              --scanners vuln \
              --vuln-type os,library \
              --severity CRITICAL,HIGH,MEDIUM \
              "$image"
            status=$?
            if [ "$status" -eq 0 ]; then
              break
            fi
            sleep 10
          done

          if [ ! -s trivy-report.txt ]; then
            {
              echo "Trivy scan could not complete after retries."
              echo "Image: $image"
              echo "Exit status: $status"
            } > trivy-report.txt
          fi

          exit 0

      - name: Upload Trivy report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: trivy-report-${{ github.run_id }}
          path: trivy-report.txt

      - name: Add Trivy report to PR
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const fs = require('fs');
            let report = fs.readFileSync('trivy-report.txt', 'utf8');
            const maxLen = 60000;
            if (report.length > maxLen) {
              report = report.slice(0, maxLen) + '\n... output truncated ...';
            }
            const body = [
              '## Trivy vulnerability report',
              '',
              `Image: ${{ inputs.image }}:${{ inputs.version }}`,
              '',
              '```text',
              report,
              '```'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker tags to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          image="${{ inputs.image }}"
          version="${{ inputs.version }}"
          short_sha="${GITHUB_SHA::7}"

          docker tag "$image:$version" "$image:latest"
          docker tag "$image:$version" "$image:main"
          docker tag "$image:$version" "$image:sha-$short_sha"

          docker push "$image:$version"
          docker push "$image:latest"
          docker push "$image:main"
          docker push "$image:sha-$short_sha"

      - name: Install Cosign
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: sign
        shell: bash
        run: |
          set -euo pipefail
          image="${{ inputs.image }}"
          version="${{ inputs.version }}"
          short_sha="${GITHUB_SHA::7}"
          digest=$(docker inspect --format='{{index .RepoDigests 0}}' "$image:$version" | cut -d@ -f2)
          for tag in "$image:$version" "$image:latest" "$image:main" "$image:sha-$short_sha"; do
            cosign sign --yes "$tag"
          done
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: attest_build_provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ${{ inputs.image }}
          subject-digest: ${{ steps.sign.outputs.digest }}

      - name: Prepare attestation bundle asset
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          cp "${{ steps.attest_build_provenance.outputs.bundle-path }}" "release/docker-image-attestation.bundle.json"
          printf '%s\n' "${{ steps.attest_build_provenance.outputs.attestation-url }}" > "release/docker-image-attestation.url.txt"

      - name: Upload attestation bundle artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docker-attestation-bundle
          path: |
            release/docker-image-attestation.bundle.json
            release/docker-image-attestation.url.txt
