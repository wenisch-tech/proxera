name: Release

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag:
        required: true
        type: string
      changelog:
        required: true
        type: string
      image:
        required: true
        type: string
      digest:
        required: false
        type: string
        default: ''

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Update CHANGELOG.md
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag }}"
          image="${{ inputs.image }}:${{ inputs.version }}"
          date="$(date -u +%Y-%m-%d)"
          changelog="${{ inputs.changelog }}"

          {
            echo "## ${tag} - ${date}"
            echo
            echo "$changelog"
            echo
            echo "Docker image: ${image}"
            echo
          } > .release_entry.md

          if [ -f CHANGELOG.md ]; then
            {
              head -n 1 CHANGELOG.md
              echo
              cat .release_entry.md
              tail -n +2 CHANGELOG.md
            } > CHANGELOG.new.md
            mv CHANGELOG.new.md CHANGELOG.md
          else
            {
              echo "# Changelog"
              echo
              cat .release_entry.md
            } > CHANGELOG.md
          fi

      - name: Set Maven version
        run: mvn -B versions:set -DnewVersion=${{ inputs.version }} -DgenerateBackupPoms=false

      - name: Update Helm chart version
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          yq eval ".appVersion = \"$version\"" -i charts/proxera/Chart.yaml
          yq eval ".version = \"$version\"" -i charts/proxera/Chart.yaml
          yq eval ".image.tag = \"$version\"" -i charts/proxera/values.yaml

      - name: Generate Helm values schema
        shell: bash
        run: |
          set -euo pipefail
          helm plugin install https://github.com/karuppiah7890/helm-schema-gen.git
          helm schema-gen charts/proxera/values.yaml > charts/proxera/values.schema.json

      - name: Commit release files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pom.xml CHANGELOG.md charts/proxera/Chart.yaml charts/proxera/values.yaml charts/proxera/values.schema.json
          git commit -m "chore(release): ${{ inputs.tag }} [skip ci]" || exit 0
          git push

      - name: Package Helm chart
        run: helm package charts/proxera/ --destination ./release

      - name: Generate application SBOM (CycloneDX)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./release
          mvn -B org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeAggregateBom \
            -DoutputFormat=all \
            -DoutputName="proxera-${{ inputs.version }}-sbom" \
            -DoutputDirectory=./release

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign Helm chart
        shell: bash
        run: |
          set -euo pipefail
          tgz=$(ls ./release/*.tgz | head -1)
          cosign sign-blob --yes "$tgz" --bundle "${tgz}.cosign.bundle"

      - name: Upload Helm chart artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: helm-chart
          path: |
            ./release/*.tgz
            ./release/*.cosign.bundle
            ./release/*-sbom.json
            ./release/*-sbom.xml

      - name: Publish Helm chart to charts repository
        env:
          GH_TOKEN: ${{ secrets.GITHUBTOKEN }}
        run: |
          git clone https://$GH_TOKEN@github.com/jfwenisch/charts.git charts-repo
          mkdir -p charts-repo/proxera
          cp ./release/*.tgz charts-repo/proxera/
          cp ./release/*.cosign.bundle charts-repo/proxera/ 2>/dev/null || true
          cd charts-repo
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Add Proxera helm chart in version ${{ inputs.version }}" || echo "No chart changes to commit"
          git push https://$GH_TOKEN@github.com/jfwenisch/charts.git main

      - name: Download Docker attestation bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docker-attestation-bundle
          path: ./release

      - name: Download native-distroless app archive artifact
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: proxera-native-distroless-app-linux-amd64
          path: ./release

      - name: Read attestation URL
        id: read_attestation_url
        shell: bash
        run: |
          set -euo pipefail
          url=$(cat ./release/docker-image-attestation.url.txt)
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          files: |
            ./release/docker-image-attestation.bundle.json
            ./release/proxera-native-distroless-app-linux-amd64.tar.gz
            ./release/*.tgz
            ./release/*.cosign.bundle
            ./release/*-sbom.json
            ./release/*-sbom.xml
          body: |
            ${{ inputs.changelog }}

            ## Docker image
            ```
            ${{ inputs.image }}:${{ inputs.version }}
            ${{ inputs.image }}@${{ inputs.digest }}
            ```

            ## SBOM
            A CycloneDX SBOM is attached as:
            - `proxera-${{ inputs.version }}-sbom.json`
            - `proxera-${{ inputs.version }}-sbom.xml`

            ## Signature & Attestation
            This image was signed using [Sigstore Cosign](https://docs.sigstore.dev/cosign/overview/) with keyless signing via GitHub Actions OIDC.
            A [SLSA provenance attestation](${{ steps.read_attestation_url.outputs.url }}) is attached.

            **Verify image signature:**
            ```bash
            cosign verify ${{ inputs.image }}@${{ inputs.digest }} \
              --certificate-identity-regexp="https://github.com/wenisch-tech/proxera" \
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com"
            ```

            **Verify Helm chart signature:**
            ```bash
            cosign verify-blob proxera-${{ inputs.version }}.tgz \
              --bundle proxera-${{ inputs.version }}.tgz.cosign.bundle \
              --certificate-identity-regexp="https://github.com/wenisch-tech/proxera" \
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com"
            ```
