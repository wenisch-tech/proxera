# Default values for Proxera.

replicaCount: 1

image:
  registry: ghcr.io
  repository: wenisch-tech/proxera
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  proxy:
    port: 8080
    targetPort: 8080
  admin:
    port: 8081
    targetPort: 8081

ingress:
  proxy:
    enabled: false
    className: nginx
    annotations: {}
    hosts:
      - host: proxy.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []
  admin:
    enabled: false
    className: nginx
    annotations: {}
    hosts:
      - host: admin.proxera.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  enabled: true
  httpGet:
    path: /actuator/health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /actuator/health/readiness
    port: 8080
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

persistence:
  enabled: false
  storageClassName: ""
  size: 1Gi
  mountPath: /app/data

# Redis (optional — enables multi-pod scaling via Pub/Sub)
# When host is empty, in-memory message bus is used (single-pod default).
redis:
  enabled: false
  host: ""
  port: 6379

# Non-sensitive environment variables (mounted as ConfigMap)
env:
  SPRING_DATASOURCE_URL: "jdbc:h2:file:/app/data/proxera"
  SPRING_DATASOURCE_USERNAME: "sa"
  PROXERA_ADMIN_PORT: "8081"
  PROXERA_LOG_RETENTION_DAYS: "7"

# Sensitive environment variables (mounted as Kubernetes Secret)
secrets:
  SPRING_DATASOURCE_PASSWORD: ""
  OIDC_CLIENT_SECRET: ""
  REDIS_PASSWORD: ""

nodeSelector: {}
tolerations: []
affinity: {}
