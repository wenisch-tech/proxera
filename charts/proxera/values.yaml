# Default values for Proxera.
# 
replicaCount: 1
image:
  registry: ghcr.io
  repository: wenisch-tech/proxera
  tag: 0.12.3
  pullPolicy: IfNotPresent
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
serviceAccount:
  create: true
  name: ""
rbac:
  create: true
podAnnotations: {}
podLabels: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
service:
  type: ClusterIP
  port: 8080
ingress:
  # Proxy ingress (the wildcard ingress that routes public traffic into Proxera)
  # is managed at runtime by Proxera itself via the Topology UI when running in-cluster.
  # Configure it there after deployment.
  admin:
    enabled: false
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
      nginx.ingress.kubernetes.io/proxy-body-size: "64m"
    hosts:
      - host: admin.proxera.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi
livenessProbe:
  enabled: true
  httpGet:
    path: /actuator/health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3
readinessProbe:
  enabled: true
  httpGet:
    path: /actuator/health/readiness
    port: 8080
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
# Startup probe — blocks liveness checks until the JVM is fully up.
# failureThreshold * periodSeconds = max startup budget (20 * 5s = 100s)
startupProbe:
  enabled: true
  httpGet:
    path: /actuator/health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 20
# Grace period for in-flight tunnel sessions during pod replacement.
terminationGracePeriodSeconds: 60
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
persistence:
  enabled: false
  storageClassName: ""
  size: 1Gi
  mountPath: /app/data
# Redis (optional — enables multi-pod scaling via Pub/Sub)

# Set enabled=true to deploy a bundled in-cluster Redis and wire Proxera to it.
# Leave enabled=false and set host to use an external Redis service instead.
redis:
  enabled: false
  host: ""
  port: 6379
  image:
    repository: redis
    tag: 7.4-alpine
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
# Non-sensitive environment variables (mounted as ConfigMap)

# PostgreSQL: set DB_HOST (and optionally DB_PORT, DB_NAME, DB_USER) to switch from H2.

# H2 file path is controlled by H2_DATA_PATH (auto-set from persistence.mountPath when persistence.enabled=true).
env:
  PROXERA_LOG_RETENTION_DAYS: "7"
  # Admin host restriction — only this hostname serves the Proxera admin UI/login.
  # Leave empty to use dynamic mode (any configured proxy route domain is auto-excluded).
  PROXERA_ADMIN_HOST: ""
  # DB_HOST: ""
# DB_PORT: "5432"

# DB_NAME: "proxera"

# DB_USER: "proxera"

# Sensitive environment variables (mounted as Kubernetes Secret)
secrets:
  DB_PASSWORD: ""
  OIDC_CLIENT_SECRET: ""
  REDIS_PASSWORD: ""
nodeSelector: {}
tolerations: []
affinity: {}
