apiVersion: v1
kind: Service
metadata:
  name: {{ include "proxera.fullname" . }}
  labels:
    {{- include "proxera.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
  selector:
    {{- include "proxera.selectorLabels" . | nindent 4 }}
