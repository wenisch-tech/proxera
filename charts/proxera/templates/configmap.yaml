apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "proxera.fullname" . }}
  labels:
    {{- include "proxera.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- if .Values.redis.host }}
  REDIS_HOST: {{ .Values.redis.host | quote }}
  REDIS_PORT: {{ .Values.redis.port | quote }}
  {{- end }}
  PROXERA_POD_ID: "$(POD_NAME)"
