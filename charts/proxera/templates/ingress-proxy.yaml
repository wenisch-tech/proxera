{{- if .Values.ingress.proxy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "proxera.fullname" . }}-proxy
  labels:
    {{- include "proxera.labels" . | nindent 4 }}
  {{- with .Values.ingress.proxy.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.proxy.className }}
  ingressClassName: {{ .Values.ingress.proxy.className }}
  {{- end }}
  {{- if .Values.ingress.proxy.tls }}
  tls:
    {{- toYaml .Values.ingress.proxy.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.proxy.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "proxera.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
