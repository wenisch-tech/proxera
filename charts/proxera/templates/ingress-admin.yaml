{{- if .Values.ingress.admin.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "proxera.fullname" . }}-admin
  labels:
    {{- include "proxera.labels" . | nindent 4 }}
  {{- with .Values.ingress.admin.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.admin.className }}
  ingressClassName: {{ .Values.ingress.admin.className }}
  {{- end }}
  {{- if .Values.ingress.admin.tls }}
  tls:
    {{- toYaml .Values.ingress.admin.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.admin.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "proxera.fullname" $ }}
                port:
                  number: {{ $.Values.service.admin.port }}
          {{- end }}
    {{- end }}
{{- end }}
