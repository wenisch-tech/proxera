site_name: Proxera
site_url: https://proxera.wenisch.tech
site_description: Self-hosted reverse tunnel — expose LAN services to the internet
site_author: Jean-Fabian Wenisch
repo_url: https://github.com/wenisch-tech/proxera
repo_name: wenisch-tech/proxera
edit_uri: edit/main/docs/

theme:
  name: material
  logo: img/proxera.png
  favicon: img/proxera.png
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - content.code.copy

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Configuration: configuration.md
  - API Reference: api.md
  - Home Assistant: homeassistant.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true
