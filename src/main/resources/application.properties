# ===========================
# Proxera Server Configuration
# ===========================

# Proxy port (tunnel + catch-all HTTP proxy)
server.port=8080

# ===========================
# Database
# ===========================
# Default: embedded H2 (no setup required).
# Set DB_HOST to switch to PostgreSQL — see README for all variables.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# H2 web console (accessible at /h2-console when running with embedded H2)
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=false

# ===========================
# Flyway
# ===========================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ===========================
# Redis (optional — set REDIS_HOST to enable multi-pod scaling)
# When REDIS_HOST is absent the in-memory message bus is used automatically.
# ===========================
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# ===========================
# WebSocket
# ===========================
spring.websocket.server.allowed-origins=*

# ===========================
# Actuator
# ===========================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# ===========================
# OpenAPI / Springdoc
# ===========================
springdoc.api-docs.path=/v3/api-docs

# Disable Spring Boot's default /** static resource mapping so proxy traffic
# falls through to ProxyController (AbstractHandlerMapping at LOWEST_PRECEDENCE).
# Our specific /webjars/**, /css/**, /js/** handlers in WebMvcConfig are unaffected.
spring.web.resources.add-mappings=false

# Session tracking via cookie only (prevents jsessionid in URL / redirect loops)
server.servlet.session.tracking-modes=cookie
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ===========================
# Session (cookie-only tracking prevents Tomcat URL rewriting /login → /login;jsessionid=...)
# ===========================
server.servlet.session.tracking-modes=cookie

# ===========================
# Proxy / Forwarded headers
# ===========================
server.forward-headers-strategy=native
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto

# ===========================
# Thymeleaf
# ===========================
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===========================
# Tomcat tuning for reverse-proxy workloads
# ===========================

# Graceful shutdown: let in-flight requests drain before the process exits.
# timeout-per-shutdown-phase should be slightly less than K8s terminationGracePeriodSeconds (60s).
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=55s

# Allow special characters in proxied URLs that proxied apps (Angular, React, APIs) commonly use.
# Without this Tomcat returns 400 before the request reaches any controller.
server.tomcat.relaxed-path-chars=|,{,},[,]
server.tomcat.relaxed-query-chars=|,{,},[,]

# Max time Tomcat waits for the initial HTTP request line/headers after a connection is accepted.
# Increased from the 20s default for tunnel clients on high-latency or intermittent networks.
server.tomcat.connection-timeout=60000

# ===========================
# Async / DeferredResult
# ===========================
spring.mvc.async.request-timeout=35000

# Proxera is a reverse proxy: multipart/form-data bodies must be forwarded as
# raw bytes. If Spring MVC parses multipart requests first, proxied backends can
# receive a Content-Type boundary whose body has already been consumed.
spring.servlet.multipart.enabled=false

# ===========================
# Admin host restriction (optional)
# ===========================
# When set, only requests whose Host header matches this value will be served
# by the Proxera admin UI / login. Requests from all other hosts (including
# configured proxy route domains) are forwarded to the backend via ProxyController.
# Leave empty (default) to use dynamic mode: any host that matches a configured
# proxy route domain is automatically excluded from the admin chain.
proxera.admin.host=${PROXERA_ADMIN_HOST:}
