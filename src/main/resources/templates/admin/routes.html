<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(activePage='routes', pageTitle='Routes', content=~{::content}, extraHead=~{}, extraScripts=~{::extraScripts})}">
<body>
<th:block th:fragment="content">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/admin/topology}"><i class="bi bi-house"></i> Home</a></li>
            <li class="breadcrumb-item active">Routes</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0 fw-bold" style="font-size:1.45rem;"><i class="bi bi-signpost-split me-2" style="color:var(--px-accent);"></i>Routes</h2>
        <a th:href="@{/admin/routes/new}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i> New Route
        </a>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Agent</th>
                    <th>Target</th>
                    <th>Domains</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="route : ${routes}">
                    <td>
                        <span th:text="${route.name}" class="fw-semibold"></span>
                    </td>
                    <td th:text="${route.agent?.name}"></td>
                    <td class="small text-muted" th:text="${route.localHost + ':' + route.localPort}"></td>
                    <td>
                        <div th:each="d : ${route.domains}" class="mb-1">
                            <span class="badge bg-secondary"
                                  th:text="${d.domain + (d.pathPrefix != null ? d.pathPrefix : '')}"></span>
                        </div>
                    </td>
                    <td>
                        <span th:if="${route.enabled}" class="badge bg-success">Enabled</span>
                        <span th:unless="${route.enabled}" class="badge bg-secondary">Disabled</span>
                    </td>
                    <td>
                        <!-- View details -->
                        <a th:href="@{/admin/routes/{id}(id=${route.id})}" class="btn btn-sm btn-outline-secondary" title="View details">
                            <i class="bi bi-eye"></i>
                        </a>
                        <!-- Edit (opens modal) -->
                        <button type="button" class="btn btn-sm btn-outline-primary" title="Edit"
                                data-bs-toggle="modal" data-bs-target="#editModal"
                                th:attr="
                                    data-id=${route.id},
                                    data-name=${route.name},
                                    data-agent-id=${route.agent?.id},
                                    data-local-host=${route.localHost},
                                    data-local-port=${route.localPort},
                                    data-enabled=${route.enabled},
                                    data-domain-hosts=${#strings.listJoin(route.domains.![domain], ',')},
                                    data-domain-paths=${#strings.listJoin(route.domains.![pathPrefix ?: ''], ',')},
                                    data-domain-strips=${#strings.listJoin(route.domains.![stripPrefix ? 'true' : 'false'], ',')}">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <!-- Delete -->
                        <form th:action="@{/admin/routes/{id}/delete(id=${route.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Delete this route?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger" title="Delete">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(routes)}">
                    <td colspan="6" class="text-center text-muted py-4">No routes configured.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editModalLabel">Edit Route</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="editForm" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="edit-name" class="form-label">Route Name</label>
                            <input type="text" id="edit-name" name="name" class="form-control" required/>
                        </div>
                        <div class="mb-3">
                            <label for="edit-agentId" class="form-label">Agent</label>
                            <select id="edit-agentId" name="agentId" class="form-select" required>
                                <option th:each="agent : ${agents}"
                                        th:value="${agent.id}"
                                        th:text="${agent.name}"></option>
                            </select>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-8">
                                <label for="edit-localHost" class="form-label">LAN Host</label>
                                <input type="text" id="edit-localHost" name="localHost" class="form-control" required/>
                            </div>
                            <div class="col-4">
                                <label for="edit-localPort" class="form-label">Port</label>
                                <input type="number" id="edit-localPort" name="localPort" class="form-control" required min="1" max="65535"/>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Domain Entries</label>
                            <div class="row g-2 mb-1">
                                <div class="col-5 small text-muted fw-semibold">Domain</div>
                                <div class="col-4 small text-muted fw-semibold">Path Prefix</div>
                                <div class="col-2 small text-muted fw-semibold text-center">Strip</div>
                                <div class="col-1"></div>
                            </div>
                            <div id="edit-domains-table"></div>
                            <button type="button" class="btn btn-sm btn-outline-secondary mt-1" onclick="addEditDomainEntry('','',true)">
                                <i class="bi bi-plus-lg me-1"></i> Add Entry
                            </button>
                            <small class="d-block text-muted mt-1">Each domain must point to this Proxera server via DNS.</small>
                        </div>
                        <div class="form-check">
                            <input type="checkbox" id="edit-enabled" name="enabled" class="form-check-input" value="true"/>
                            <label for="edit-enabled" class="form-check-label">Enabled</label>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i> Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</th:block>

<th:block th:fragment="extraScripts">
<script>
    const editModal = document.getElementById('editModal');
    editModal.addEventListener('show.bs.modal', function (event) {
        const btn = event.relatedTarget;
        const id          = btn.dataset.id;
        const name        = btn.dataset.name;
        const agentId     = btn.dataset.agentId;
        const localHost   = btn.dataset.localHost;
        const localPort   = btn.dataset.localPort;
        const enabled     = btn.dataset.enabled === 'true';
        const hosts  = btn.dataset.domainHosts  ? btn.dataset.domainHosts.split(',')  : [];
        const paths  = btn.dataset.domainPaths  ? btn.dataset.domainPaths.split(',')  : [];
        const strips = btn.dataset.domainStrips ? btn.dataset.domainStrips.split(',') : [];

        document.getElementById('editForm').action = `/admin/routes/${id}`;
        document.getElementById('edit-name').value = name;
        document.getElementById('edit-localHost').value = localHost;
        document.getElementById('edit-localPort').value = localPort;
        document.getElementById('edit-enabled').checked = enabled;

        const agentSelect = document.getElementById('edit-agentId');
        for (const opt of agentSelect.options) {
            opt.selected = opt.value === agentId;
        }

        const table = document.getElementById('edit-domains-table');
        table.innerHTML = '';
        if (hosts.length > 0) {
            hosts.forEach((h, i) => addEditDomainEntry(h, paths[i] || '', strips[i] !== 'false'));
        } else {
            addEditDomainEntry('', '', true);
        }
    });

    function addEditDomainEntry(host, path, strip) {
        const table = document.getElementById('edit-domains-table');
        const div = document.createElement('div');
        div.className = 'row g-2 mb-2 align-items-center domain-entry';
        const checked = strip ? 'checked' : '';
        const stripVal = strip ? 'true' : 'false';
        div.innerHTML = `
            <div class="col-5">
                <input type="text" name="domainHosts" class="form-control form-control-sm"
                       placeholder="example.com" value="${host}"/>
            </div>
            <div class="col-4">
                <input type="text" name="domainPaths" class="form-control form-control-sm"
                       placeholder="/grafana" value="${path}"/>
            </div>
            <div class="col-2 text-center">
                <input type="hidden" name="domainStrips" value="${stripVal}"/>
                <input type="checkbox" class="form-check-input" ${checked}
                       onchange="this.previousElementSibling.value = this.checked ? 'true' : 'false'"/>
            </div>
            <div class="col-1">
                <button type="button" class="btn btn-sm btn-outline-danger"
                        onclick="this.closest('.domain-entry').remove()">
                    <i class="bi bi-trash"></i>
                </button>
            </div>`;
        table.appendChild(div);
    }
</script>
</th:block>
</body>
</html>
