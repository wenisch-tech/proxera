<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(activePage='topology', pageTitle='Topology', content=~{::content}, extraHead=~{::extraHead}, extraScripts=~{::extraScripts})}">
<body>

<th:block th:fragment="extraHead">
    <style>
        #topology-canvas {
            width: 100%;
            height: 640px;
            border: 1px solid var(--px-border, #dee2e6);
            border-radius: var(--px-radius, 8px);
            background: #060b14;
            overflow: hidden;
        }

        /* Animated flow particles on tunnel edges */
        @keyframes flowDash {
            from { stroke-dashoffset: 70; }
            to   { stroke-dashoffset: 0; }
        }
        .edge-flow {
            animation: flowDash 1.8s linear infinite;
        }

        /* Link pulse on active request */
        @keyframes linkPulse {
            0%, 100% { stroke-opacity: 0.6; }
            50%       { stroke-opacity: 1.0; stroke-width: 3px; }
        }
        .link-pulsing {
            animation: linkPulse 0.55s ease-in-out infinite;
        }

        /* Legend dots */
        .topo-legend-dot {
            display: inline-block;
            width: 10px; height: 10px;
            border-radius: 2px;
            vertical-align: middle;
            margin-right: 5px;
        }
    </style>
</th:block>

<th:block th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0 fw-bold" style="font-size:1.45rem;"><i class="bi bi-diagram-3 me-2" style="color:var(--px-accent);"></i>Topology</h2>
        <div class="d-flex align-items-center gap-2">
            <span class="px-live-badge" id="sse-status"><span class="px-live-dot"></span> Live</span>
            <button class="btn btn-sm btn-outline-secondary" onclick="refreshTopology()">
                <i class="bi bi-arrow-clockwise"></i> Refresh
            </button>
        </div>
    </div>
    <div id="topology-canvas"></div>

    <!-- Legend -->
    <div class="d-flex flex-wrap gap-4 mt-3 small text-muted">
        <span><span class="topo-legend-dot" style="background:#818cf8;"></span> Proxy Server</span>
        <span><span class="topo-legend-dot" style="background:#34d399;"></span> Connected Agent</span>
        <span><span class="topo-legend-dot" style="background:#64748b;"></span> Offline Agent</span>
        <span><span class="topo-legend-dot" style="background:#fbbf24;"></span> Route (enabled)</span>
        <span style="margin-left:auto;" class="text-muted" style="font-size:.8rem;">
            <i class="bi bi-info-circle me-1"></i>Edges: solid = tunnel &nbsp;·&nbsp; dashed = route mapping
        </span>
    </div>
</th:block>

<th:block th:fragment="extraScripts">
    <script th:src="@{/webjars/d3/d3.min.js}"></script>
    <script th:src="@{/js/topology.js}"></script>
    <script>
        // Load initial data, then subscribe to SSE updates
        refreshTopology();

        const sse = new EventSource('/admin/sse/topology');
        sse.addEventListener('AGENT_CONNECTED', () => refreshTopology());
        sse.addEventListener('AGENT_DISCONNECTED', () => refreshTopology());
        sse.addEventListener('ROUTE_UPDATED', () => refreshTopology());
        sse.addEventListener('REQUEST_IN_FLIGHT', (e) => pulseLink(JSON.parse(e.data)));
        sse.addEventListener('REQUEST_COMPLETED', (e) => clearPulse(JSON.parse(e.data)));
        sse.onerror = () => {
            document.getElementById('sse-status').textContent = 'Reconnecting…';
            document.getElementById('sse-status').className = 'badge bg-warning text-dark';
        };
        sse.onopen = () => {
            document.getElementById('sse-status').textContent = 'Live';
            document.getElementById('sse-status').className = 'badge bg-success';
        };
    </script>
</th:block>

</body>
</html>
