<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(activePage='api-keys', pageTitle='API Keys', content=~{::content}, extraHead=~{}, extraScripts=~{})}">
<body>
<th:block th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0 fw-bold" style="font-size:1.45rem;"><i class="bi bi-key me-2" style="color:var(--px-accent);"></i>API Keys</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newKeyModal">
            <i class="bi bi-plus-lg me-1"></i> Generate Key
        </button>
    </div>

    <!-- New key flash -->
    <div th:if="${newKey}" class="alert alert-warning">
        <strong><i class="bi bi-exclamation-triangle me-1"></i>New API key (shown once):</strong>
        <div class="mt-2">
            <code class="user-select-all fs-6" th:text="${newKey}"></code>
        </div>
        <small class="text-muted">Include as <code>X-API-KEY: &lt;key&gt;</code> header.</small>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Created</th>
                    <th>Last Used</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="key : ${apiKeys}">
                    <td th:text="${key.name}"></td>
                    <td class="text-muted" th:text="${#temporals.format(key.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                    <td class="text-muted"
                        th:text="${key.lastUsedAt != null ? #temporals.format(key.lastUsedAt, 'yyyy-MM-dd HH:mm') : '—'}"></td>
                    <td>
                        <form th:action="@{/admin/api-keys/{id}/revoke(id=${key.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Revoke this API key?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash"></i> Revoke
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(apiKeys)}">
                    <td colspan="4" class="text-center text-muted py-4">No API keys.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="newKeyModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/admin/api-keys}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title">Generate API Key</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <label for="name" class="form-label">Key Name</label>
                        <input type="text" id="name" name="name" class="form-control" required placeholder="CI pipeline key"/>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Generate</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
