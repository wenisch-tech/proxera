<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(activePage='clients', pageTitle='Clients', content=~{::content}, extraHead=~{}, extraScripts=~{})}">
<body>
<th:block th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0"><i class="bi bi-hdd-rack me-2"></i>Clients</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newClientModal">
            <i class="bi bi-plus-lg me-1"></i> New Client
        </button>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Name</th>
                    <th>Status</th>
                    <th>Last Seen</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="client : ${clients}">
                    <td>
                        <a th:href="@{/admin/clients/{id}(id=${client.id})}" th:text="${client.name}"
                           class="text-decoration-none fw-semibold"></a>
                    </td>
                    <td>
                        <span class="badge"
                              th:classappend="${client.status.name() == 'CONNECTED' ? 'bg-success' : (client.status.name() == 'REGISTERED' ? 'bg-info' : 'bg-secondary')}"
                              th:text="${client.status}"></span>
                    </td>
                    <td th:text="${client.lastSeenAt != null ? #temporals.format(client.lastSeenAt, 'yyyy-MM-dd HH:mm') : '—'}"></td>
                    <td>
                        <a th:href="@{/admin/clients/{id}(id=${client.id})}" class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{/admin/clients/{id}/delete(id=${client.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Delete client?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(clients)}">
                    <td colspan="4" class="text-center text-muted py-4">No clients registered yet.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- New client modal -->
    <div class="modal fade" id="newClientModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/admin/clients}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title">New Client</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <label for="name" class="form-label">Client Name</label>
                        <input type="text" id="name" name="name" class="form-control" required
                               placeholder="my-homelab-client"/>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Create</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
