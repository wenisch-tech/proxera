<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(activePage='agents', pageTitle='Agents', content=~{::content}, extraHead=~{}, extraScripts=~{})}">
<body>
<th:block th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0 fw-bold" style="font-size:1.45rem;"><i class="bi bi-hdd-rack me-2" style="color:var(--px-accent);"></i>Agents</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newAgentModal">
            <i class="bi bi-plus-lg me-1"></i> New Agent
        </button>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Status</th>
                    <th>Last Seen</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="agent : ${agents}">
                    <td>
                        <a th:href="@{/admin/agents/{id}(id=${agent.id})}" th:text="${agent.name}"
                           class="text-decoration-none fw-semibold"></a>
                    </td>
                    <td>
                        <span class="badge"
                              th:classappend="${agent.status.name() == 'CONNECTED' ? 'bg-success' : (agent.status.name() == 'REGISTERED' ? 'bg-info' : 'bg-secondary')}"
                              th:text="${agent.status}"></span>
                    </td>
                    <td th:text="${agent.lastSeenAt != null ? #temporals.format(agent.lastSeenAt, 'yyyy-MM-dd HH:mm') : '—'}"></td>
                    <td>
                        <a th:href="@{/admin/agents/{id}(id=${agent.id})}" class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{/admin/agents/{id}/delete(id=${agent.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Delete agent?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(agents)}">
                    <td colspan="4" class="text-center text-muted py-4">No agents registered yet.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- New agent modal -->
    <div class="modal fade" id="newAgentModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/admin/agents}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title">New Agent</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <label for="name" class="form-label">Agent Name</label>
                        <input type="text" id="name" name="name" class="form-control" required
                               placeholder="my-homelab-agent"/>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Create</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
