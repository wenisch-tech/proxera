<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(activePage='', pageTitle='Error', content=~{::content}, extraHead=~{}, extraScripts=~{})}">
<body>
<th:block th:fragment="content">
    <div class="d-flex align-items-center mb-4 gap-3">
        <i class="bi bi-exclamation-triangle-fill text-danger fs-2"></i>
        <h2 class="mb-0">An error occurred</h2>
    </div>

    <div class="alert alert-danger d-flex align-items-start gap-2" role="alert">
        <i class="bi bi-x-circle-fill mt-1 flex-shrink-0"></i>
        <div>
            <strong th:text="${errorMessage} ?: 'An unexpected error occurred.'">An unexpected error occurred.</strong>
        </div>
    </div>

    <div th:if="${stackTrace}" class="card border-0 shadow-sm">
        <div class="card-header bg-light d-flex justify-content-between align-items-center">
            <span class="fw-semibold text-muted small"><i class="bi bi-code-slash me-1"></i>Stack Trace</span>
            <button class="btn btn-sm btn-outline-secondary"
                    onclick="navigator.clipboard.writeText(document.getElementById('stackTrace').innerText)">
                <i class="bi bi-clipboard me-1"></i>Copy
            </button>
        </div>
        <div class="card-body p-0">
            <pre id="stackTrace" class="m-0 p-3 small text-danger-emphasis bg-danger-subtle"
                 style="max-height: 60vh; overflow-y: auto; white-space: pre-wrap; word-break: break-all;"
                 th:text="${stackTrace}"></pre>
        </div>
    </div>

    <div class="mt-3">
        <a th:href="@{/admin/}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
        </a>
    </div>
</th:block>
</body>
</html>
