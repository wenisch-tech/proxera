<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(activePage='settings', pageTitle='Settings', content=~{::content}, extraHead=~{}, extraScripts=~{})}">
<body>
<th:block th:fragment="content">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/admin/topology}"><i class="bi bi-house"></i> Home</a></li>
            <li class="breadcrumb-item active">Settings</li>
        </ol>
    </nav>

    <div class="d-flex align-items-center mb-4">
        <h2 class="mb-0 fw-bold" style="font-size:1.45rem;"><i class="bi bi-gear me-2" style="color:var(--px-accent);"></i>Settings</h2>
    </div>

    <div class="card mb-4">
        <div class="card-header"><i class="bi bi-sliders me-1"></i>Proxy Behaviour</div>
        <div class="card-body">
            <form th:action="@{/admin/settings}" method="post" th:object="${settings}">
                <div class="form-check mb-3">
                    <input type="checkbox" class="form-check-input" id="rewriteUrls" th:field="*{rewriteUrls}"/>
                    <label class="form-check-label" for="rewriteUrls">
                        <strong>Rewrite absolute URLs in proxied responses</strong>
                        <div class="text-muted small mt-1">When a route uses a path prefix with strip-prefix enabled,
                            automatically prepend the prefix to absolute paths found in HTML, CSS, and JavaScript
                            responses. Enables sub-path proxying for most web applications without app-level
                            configuration.</div>
                    </label>
                </div>
                <button type="submit" class="btn btn-primary btn-sm">
                    <i class="bi bi-floppy me-1"></i> Save
                </button>
            </form>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header"><i class="bi bi-server me-1"></i>Server Info</div>
        <div class="card-body">
            <dl class="row mb-0">
                <dt class="col-sm-3">Pod / Hostname</dt>
                <dd class="col-sm-9 font-monospace" th:text="${hostname}"></dd>
                <dt class="col-sm-3">Java Version</dt>
                <dd class="col-sm-9 font-monospace" th:text="${javaVersion}"></dd>
                <dt class="col-sm-3">Proxy Port</dt>
                <dd class="col-sm-9 font-monospace">8080</dd>
                <dt class="col-sm-3">Admin Port</dt>
                <dd class="col-sm-9 font-monospace">8080</dd>
            </dl>
        </div>
    </div>

    <div class="card">
        <div class="card-header"><i class="bi bi-link-45deg me-1"></i>Quick Links</div>
        <div class="card-body d-flex gap-3 flex-wrap">
            <a th:href="@{/actuator/health}" target="_blank" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-heart-pulse me-1"></i> Health
            </a>
            <a th:href="@{/v3/api-docs}" target="_blank" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-file-code me-1"></i> OpenAPI Spec
            </a>
            <a th:href="@{/swagger-ui.html}" target="_blank" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-box me-1"></i> Swagger UI
            </a>
        </div>
    </div>
</th:block>
</body>
</html>
