<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(activePage='dashboard', pageTitle='Dashboard', content=~{::content}, extraHead=~{::extraHead}, extraScripts=~{::extraScripts})}">
<body>

<th:block th:fragment="extraHead">
    <style>
        #topology-canvas {
            width: 100%;
            height: 440px;
            border-radius: var(--px-radius, 0.875rem);
            background: #080c12;
        }
    </style>
</th:block>

<th:block th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0 fw-bold" style="font-size:1.45rem;"><i class="bi bi-speedometer2 me-2" style="color:var(--px-accent);"></i>Dashboard</h2>
    </div>

    <!-- Stat cards -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="px-stat h-100">
                <div class="px-stat-icon green"><i class="bi bi-hdd-rack"></i></div>
                <div>
                    <div class="px-stat-value" th:text="${connectedAgents}">0</div>
                    <div class="px-stat-label">Connected Agents</div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="px-stat h-100">
                <div class="px-stat-icon cyan"><i class="bi bi-signpost-split"></i></div>
                <div>
                    <div class="px-stat-value" th:text="${activeRoutes}">0</div>
                    <div class="px-stat-label">Active Routes</div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="px-stat h-100">
                <div class="px-stat-icon yellow"><i class="bi bi-activity"></i></div>
                <div>
                    <div class="px-stat-value" th:text="${activeSessions}">0</div>
                    <div class="px-stat-label">Active Tunnel Sessions</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Topology -->
    <div class="card mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span><i class="bi bi-diagram-3 me-1" style="color:var(--px-accent);"></i>Network Topology</span>
            <div class="d-flex align-items-center gap-2">
                <span class="px-live-badge" id="topo-sse-status"><span class="px-live-dot"></span> Live</span>
                <button class="btn btn-sm btn-outline-secondary" onclick="refreshTopology()">
                    <i class="bi bi-arrow-clockwise"></i>
                </button>
            </div>
        </div>
        <div class="card-body p-0">
            <div id="topology-canvas"></div>
        </div>
        <div class="card-footer" style="border-top:1px solid var(--px-border);">
            <div class="d-flex gap-4 small text-muted">
                <span><span class="legend-dot" style="background:#0d6efd;"></span> Server Pod</span>
                <span><span class="legend-dot" style="background:#198754;"></span> Connected Agent</span>
                <span><span class="legend-dot" style="background:#6c757d;"></span> Offline Agent</span>
                <span><span class="legend-dot" style="background:#f59e0b;"></span> Active Route</span>
                <span style="margin-left:auto;font-size:0.75rem;">
                    <span style="display:inline-block;width:20px;height:2px;background:rgba(13,202,240,0.6);vertical-align:middle;margin-right:4px;"></span>Tunnel
                    &nbsp;
                    <span style="display:inline-block;width:20px;height:2px;background:rgba(245,158,11,0.5);vertical-align:middle;border-top:1px dashed rgba(245,158,11,0.8);margin-right:4px;"></span>Route
                </span>
            </div>
        </div>
    </div>

    <!-- Recent log -->
    <div class="card">
        <div class="card-header">
            <i class="bi bi-list-ul me-1" style="color:var(--px-accent);"></i> Recent Requests
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 small">
                    <thead>
                    <tr>
                        <th>Time</th>
                        <th>Method</th>
                        <th>Path</th>
                        <th>Status</th>
                        <th>Latency</th>
                        <th>Remote IP</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="log : ${recentLogs}">
                        <td th:text="${#temporals.format(log.timestamp, 'HH:mm:ss')}"></td>
                        <td><span class="badge bg-secondary" th:text="${log.method}"></span></td>
                        <td class="text-truncate" style="max-width:300px;" th:text="${log.path}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${log.statusCode >= 500 ? 'bg-danger' : (log.statusCode >= 400 ? 'bg-warning text-dark' : (log.statusCode >= 300 ? 'bg-info' : 'bg-success'))}"
                                  th:text="${log.statusCode}"></span>
                        </td>
                        <td th:text="${log.latencyMs} + 'ms'"></td>
                        <td th:text="${log.remoteIp}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(recentLogs)}">
                        <td colspan="6" class="text-center text-muted py-3">No requests yet.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</th:block>

<th:block th:fragment="extraScripts">
    <script th:src="@{/webjars/d3/dist/d3.min.js}"></script>
    <script th:src="@{/js/topology.js}"></script>
    <script>
        // Initial load
        refreshTopology();

        // Live SSE updates
        const topoSse = new EventSource('/admin/sse/topology');

        function setTopoStatus(live) {
            const el = document.getElementById('topo-sse-status');
            if (!el) return;
            if (live) {
                el.className = 'px-live-badge';
                el.innerHTML = '<span class="px-live-dot"></span> Live';
            } else {
                el.className = 'px-live-badge';
                el.style.borderColor = 'rgba(255,193,7,0.45)';
                el.style.color = '#ffd35a';
                el.innerHTML = '<i class="bi bi-arrow-repeat me-1"></i> Reconnecting…';
            }
        }

        topoSse.addEventListener('AGENT_CONNECTED',    () => refreshTopology());
        topoSse.addEventListener('AGENT_DISCONNECTED', () => refreshTopology());
        topoSse.addEventListener('ROUTE_UPDATED',       () => refreshTopology());
        topoSse.addEventListener('REQUEST_IN_FLIGHT',   (e) => pulseLink(JSON.parse(e.data)));
        topoSse.addEventListener('REQUEST_COMPLETED',   (e) => clearPulse(JSON.parse(e.data)));
        topoSse.onerror = () => setTopoStatus(false);
        topoSse.onopen  = () => setTopoStatus(true);
    </script>
</th:block>

</body>
</html>
