<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(activePage='dashboard', pageTitle='Dashboard', content=~{::content}, extraHead=~{}, extraScripts=~{})}">
<body>
<th:block th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0"><i class="bi bi-speedometer2 me-2"></i>Dashboard</h2>
    </div>

    <!-- Summary cards -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-circle bg-success bg-opacity-10 p-3">
                        <i class="bi bi-hdd-rack fs-4 text-success"></i>
                    </div>
                    <div>
                        <div class="fs-2 fw-bold text-success" th:text="${connectedClients}">0</div>
                        <div class="text-muted small">Connected Clients</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-circle bg-primary bg-opacity-10 p-3">
                        <i class="bi bi-signpost-split fs-4 text-primary"></i>
                    </div>
                    <div>
                        <div class="fs-2 fw-bold text-primary" th:text="${activeRoutes}">0</div>
                        <div class="text-muted small">Active Routes</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-circle bg-info bg-opacity-10 p-3">
                        <i class="bi bi-activity fs-4 text-info"></i>
                    </div>
                    <div>
                        <div class="fs-2 fw-bold text-info" th:text="${activeSessions}">0</div>
                        <div class="text-muted small">Active Tunnel Sessions</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Recent log -->
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white fw-semibold">
            <i class="bi bi-list-ul me-1"></i> Recent Requests
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 small">
                    <thead class="table-light">
                    <tr>
                        <th>Time</th>
                        <th>Method</th>
                        <th>Path</th>
                        <th>Status</th>
                        <th>Latency</th>
                        <th>Remote IP</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="log : ${recentLogs}">
                        <td th:text="${#temporals.format(log.timestamp, 'HH:mm:ss')}"></td>
                        <td><span class="badge bg-secondary" th:text="${log.method}"></span></td>
                        <td class="text-truncate" style="max-width:300px;" th:text="${log.path}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${log.statusCode >= 500 ? 'bg-danger' : (log.statusCode >= 400 ? 'bg-warning text-dark' : (log.statusCode >= 300 ? 'bg-info' : 'bg-success'))}"
                                  th:text="${log.statusCode}"></span>
                        </td>
                        <td th:text="${log.latencyMs} + 'ms'"></td>
                        <td th:text="${log.remoteIp}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(recentLogs)}">
                        <td colspan="6" class="text-center text-muted py-3">No requests yet.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
