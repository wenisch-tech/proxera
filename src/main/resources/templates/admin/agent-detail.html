<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(activePage='agents', pageTitle='Agent Detail', content=~{::content}, extraHead=~{}, extraScripts=~{})}">
<body>
<th:block th:fragment="content">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/admin/topology}"><i class="bi bi-house"></i> Home</a></li>
            <li class="breadcrumb-item"><a th:href="@{/admin/agents}">Agents</a></li>
            <li class="breadcrumb-item active" th:text="${agent.name}">Agent</li>
        </ol>
    </nav>

    <div class="d-flex align-items-center gap-2 mb-4">
        <h2 class="mb-0 fw-bold" style="font-size:1.45rem;" th:text="${agent.name}">Agent</h2>
        <span class="badge ms-2"
              th:classappend="${agent.status.name() == 'CONNECTED' ? 'bg-success' : (agent.status.name() == 'REGISTERED' ? 'bg-info' : 'bg-secondary')}"
              th:text="${agent.status}"></span>
    </div>

    <!-- Show new token once -->
    <div th:if="${newToken}" class="alert alert-warning">
        <strong><i class="bi bi-exclamation-triangle me-1"></i>New registration token (shown once):</strong>
        <div class="mt-2">
            <code class="user-select-all fs-6" th:text="${newToken}"></code>
        </div>
        <small class="text-muted">Use this token with the Proxera agent: <code>proxera-agent --token &lt;token&gt; --server wss://proxera.example.com/tunnel</code></small>
    </div>

    <div class="row g-4">
        <!-- Agent info -->
        <div class="col-md-6">
            <div class="card">
                <div class="card-header"><i class="bi bi-info-circle me-1"></i>Agent Info</div>
                <div class="card-body">
                    <dl class="row mb-0">
                        <dt class="col-sm-4">ID</dt>
                        <dd class="col-sm-8 text-muted font-monospace small" th:text="${agent.id}"></dd>
                        <dt class="col-sm-4">Name</dt>
                        <dd class="col-sm-8" th:text="${agent.name}"></dd>
                        <dt class="col-sm-4">Created</dt>
                        <dd class="col-sm-8 text-muted" th:text="${#temporals.format(agent.createdAt, 'yyyy-MM-dd HH:mm')}"></dd>
                        <dt class="col-sm-4">Last Seen</dt>
                        <dd class="col-sm-8 text-muted"
                            th:text="${agent.lastSeenAt != null ? #temporals.format(agent.lastSeenAt, 'yyyy-MM-dd HH:mm') : '—'}"></dd>
                    </dl>
                </div>
                <div class="card-footer">
                    <form th:action="@{/admin/agents/{id}/token(id=${agent.id})}" method="post">
                        <button type="submit" class="btn btn-warning btn-sm">
                            <i class="bi bi-key me-1"></i> Generate New Registration Token
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Routes -->
        <div class="col-md-6">
            <div class="card">
                <div class="card-header"><i class="bi bi-signpost-split me-1"></i>Routes</div>
                <div class="card-body p-0">
                    <table class="table table-sm mb-0">
                        <thead>
                        <tr>
                            <th>Name</th>
                            <th>Target</th>
                            <th>Status</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="route : ${routes}">
                            <td>
                                <a th:href="@{/admin/routes/{id}(id=${route.id})}" th:text="${route.name}"
                                   class="text-decoration-none"></a>
                            </td>
                            <td class="small text-muted" th:text="${route.localHost + ':' + route.localPort}"></td>
                            <td>
                                <span th:if="${route.enabled}" class="badge bg-success">Enabled</span>
                                <span th:unless="${route.enabled}" class="badge bg-secondary">Disabled</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(routes)}">
                            <td colspan="3" class="text-muted text-center py-3">No routes configured.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
