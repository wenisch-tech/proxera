<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login – Proxera</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/proxera.css}"/>
</head>
<body class="bg-dark d-flex align-items-center justify-content-center min-vh-100">
<div class="card shadow-lg" style="width:380px;">
    <div class="card-header bg-dark text-white text-center py-4">
        <i class="bi bi-hdd-network fs-2"></i>
        <h4 class="mt-2 mb-0">Proxera</h4>
        <small class="text-white-50">Admin Console</small>
    </div>
    <div class="card-body p-4">
        <div th:if="${param.error}" class="alert alert-danger py-2">
            Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-info py-2">
            You have been logged out.
        </div>
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" id="username" name="username"
                           class="form-control" autocomplete="username" required autofocus/>
                </div>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" id="password" name="password"
                           class="form-control" autocomplete="current-password" required/>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right me-1"></i> Sign in
            </button>
        </form>
    </div>
</div>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
