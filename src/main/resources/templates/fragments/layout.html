<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(activePage, pageTitle, content, extraHead, extraScripts)"
      data-bs-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle != null ? pageTitle + ' – Proxera' : 'Proxera'}">Proxera</title>

    <!-- Theme: apply saved preference before render to avoid flash -->
    <script>
        (function() {
            var t = localStorage.getItem('proxera-theme');
            if (t) document.documentElement.setAttribute('data-bs-theme', t);
        })();
    </script>

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" />
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.min.css}" />
    <link rel="stylesheet" th:href="@{/css/proxera.css}" />

    <th:block th:replace="${extraHead}"></th:block>
</head>
<body class="d-flex flex-column min-vh-100">

<!-- Navbar -->
<nav class="navbar px-navbar px-3 d-flex align-items-center">
    <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/admin/topology}">
        <i class="bi bi-hdd-network"></i>
        <span>Proxera</span>
        <span class="brand-dot ms-1"></span>
    </a>

    <!-- Primary nav: back to topology if not on topology -->
    <div class="d-flex align-items-center gap-1 ms-4" th:if="${activePage != 'topology'}">
        <a class="px-nav-link" th:href="@{/admin/topology}"
           th:classappend="${activePage == 'topology'} ? ' active' : ''">
            <i class="bi bi-diagram-3"></i>
            <span>Topology</span>
        </a>
    </div>

    <div class="d-flex align-items-center gap-1 ms-auto">
        <span class="text-muted small font-monospace me-2" id="pod-id" th:text="${podId}"></span>

        <!-- Secondary nav icon buttons -->
        <a class="px-nav-icon-btn" th:href="@{/admin/settings}" title="Settings"
           th:classappend="${activePage == 'settings'} ? ' active' : ''">
            <i class="bi bi-gear"></i>
        </a>
        <a class="px-nav-icon-btn" th:href="@{/admin/users}" title="Users"
           th:classappend="${activePage == 'users'} ? ' active' : ''">
            <i class="bi bi-people"></i>
        </a>
        <a class="px-nav-icon-btn" th:href="@{/admin/api-keys}" title="API Keys"
           th:classappend="${activePage == 'api-keys'} ? ' active' : ''">
            <i class="bi bi-key"></i>
        </a>

        <!-- Theme toggle -->
        <button class="px-theme-toggle ms-1" id="themeToggle" title="Toggle dark/light mode">
            <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
        </button>

        <a class="btn btn-sm btn-outline-secondary ms-1" th:href="@{/logout}">
            <i class="bi bi-box-arrow-right me-1"></i>Logout
        </a>
    </div>
</nav>

<!-- Main content (full width, no sidebar) -->
<main class="px-main px-animate-in">

    <!-- Flash messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-4 mx-4 mt-4" role="alert">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mb-4 mx-4 mt-4" role="alert">
        <i class="bi bi-exclamation-circle me-2"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:classappend="${activePage == 'topology'} ? '' : 'p-4'">
        <th:block th:replace="${content}"></th:block>
    </div>
</main>

<!-- Bootstrap JS -->
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>

<!-- Theme toggle script -->
<script>
    (function () {
        var btn = document.getElementById('themeToggle');
        var icon = document.getElementById('themeIcon');

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-bs-theme', theme);
            localStorage.setItem('proxera-theme', theme);
            icon.className = theme === 'dark' ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
        }

        // Init icon based on current theme
        applyTheme(document.documentElement.getAttribute('data-bs-theme') || 'dark');

        btn.addEventListener('click', function () {
            var current = document.documentElement.getAttribute('data-bs-theme');
            applyTheme(current === 'dark' ? 'light' : 'dark');
        });
    })();
</script>

<script>
    // Move all modals to <body> to escape any CSS stacking context created by animated elements
    document.querySelectorAll('.modal').forEach(function(m) { document.body.appendChild(m); });
</script>
<th:block th:replace="${extraScripts}"></th:block>
</body>
</html>
